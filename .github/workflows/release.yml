name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Build (aarch64)
        run: pnpm tauri build --target aarch64-apple-darwin

      - name: Build (x86_64)
        run: pnpm tauri build --target x86_64-apple-darwin

      - name: Collect artifacts
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p release-artifacts
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg "release-artifacts/ClawPier_${TAG_NAME}_aarch64.dmg"
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg "release-artifacts/ClawPier_${TAG_NAME}_x64.dmg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: release-artifacts/*

  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm tauri build

      - name: Collect artifacts
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p release-artifacts
          cp src-tauri/target/release/bundle/deb/*.deb "release-artifacts/ClawPier_${TAG_NAME}_amd64.deb"
          cp src-tauri/target/release/bundle/appimage/*.AppImage "release-artifacts/ClawPier_${TAG_NAME}_amd64.AppImage"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: release-artifacts/*

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm tauri build

      - name: Collect artifacts
        env:
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp src-tauri/target/release/bundle/nsis/*.exe "release-artifacts/ClawPier_${TAG_NAME}_x64-setup.exe"
          cp src-tauri/target/release/bundle/msi/*.msi "release-artifacts/ClawPier_${TAG_NAME}_x64.msi"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: release-artifacts/*

  publish-release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: false
          body_path: CHANGELOG.md
          files: release-artifacts/*
